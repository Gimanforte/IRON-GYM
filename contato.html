<!DOCTYPE html>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:black;
    color:white;
    font-family:'Montserrat', sans-serif;
}


   @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap');
    @import url('https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap');

    *{
        margin: 0;
        padding: 0;
    }

    body{
        background-color: black;
        color: white;
    }

   header{
    background-color: black;
    padding: 1%;
    display: flex;
    align-items: center; 
    justify-content: space-between; 
    box-shadow: 0 5px 10px rgba(0, 0, 0, 0.493);
}

header img{
    width: 50px;
    border-radius: 50px;
}

nav ul{
    display: flex;
    list-style: none;
}

li a{
    color: white;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 17px;
    margin: 0 40px;
    text-decoration: none;
}

a:hover{
    color: #707070;
    transition: .3s;
}

h1{
    font-family: 'Montserrat', sans-serif;
    text-align: center;
font-size: 50px;
margin: 60px;
}

.contato{
    display:flex;
    justify-content:space-around;
    gap:60px;
    padding:20px;
}


.form-box{
    background:#8b0000;
    padding:30px;
    border-radius:25px;
    border:3px solid white;
    width:550px;
}

.form-box label{
    font-family:'Bebas Neue';
    font-size:18px;
     color: black;
}

.form-box input,
.form-box textarea{
    width:100%;
    padding:15px;
    border-radius:15px;
    border:2px solid black;
    background:#e5e5e5;
    margin:10px 0 20px;
    font-weight:bold;
}

.form-box textarea{
    height:120px;
}

.form-box button{
    display:block;
    margin:auto;
    padding:12px 30px;
    border-radius:20px;
    border:none;
    background:#e5e5e5;
    border: 2px solid black;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 20px;
    cursor:pointer;
}


.info{
    max-width:500px;
}

.info-item{
    display:flex;
    align-items:center;
    gap:15px;
    margin-bottom:20px;
    font-size:18px;
}

.info-item i{
    color:rgb(255, 255, 255);
    font-size:28px;
     background-color: #8b0000;
     margin-left: 30px;
    padding: 8px;
    border-radius: 30px;
    border: 4px solid white;
}

.info-item p{
    font-family: 'Bebas Neue', sans-serif;
}


.mapa{
    width:100%;
    border-radius:20px;
    border: 2px solid #8b0000;
    margin:20px 0;
}


.horario{
    text-align:center;
    font-size:14px;
}

footer{
    margin: 3%;
    text-align: center;
    font-family: 'Bebas Neue', sans-serif;
}

footer p{
    padding: 10px;
}

</style>
</head>

<body>

<header>

    <nav>

<h1>Fale Conosco</h1>

    <div class="form-box">
        <form>
            <label>Digite seu nome:</label>
            <input type="text" required>

            <label>Seu e-mail:</label>
            <input type="email" required>

            <label>Sua mensagem:</label>
            <textarea required></textarea>

            <button>ENVIAR</button>
        </form>
    </div>

    <div class="info">

        <div class="info-item">
            <i class="fa-brands fa-whatsapp"></i>
            <p>(14) 99876-5432</p>
            <i class="fa-brands fa-instagram"></i>
            <p>@irongym</p>
        </div>

        <div class="info-item">
            <i class="fa-solid fa-location-dot"></i>
            <p>Rua Exemplo, 123 — Centro Garça - SP</p>
        </div>

        <iframe class="mapa"
        src="https://www.google.com/maps?q=Garça%20SP&output=embed">
        </iframe>

        <div class="horario">
            <strong>HORÁRIO DE FUNCIONAMENTO</strong><br>
            SEGUNDA A SEXTA: 06H ÀS 22H | SÁBADO: 08H ÀS 16H | DOMINGO: FECHADO
        </div>

    </div>

</div>
